<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>

    </style>
</head>
<body>
    <h1>form02</h1>
    <form id="form_main">
        <p>토핑 옵션 선택</p>
        치즈<input type="checkbox" id="chb_cs" class="chb_option">
        크림<input type="checkbox" id="chb_cr" class="chb_option">
        페퍼로니<input type="checkbox" id="chb_pp" class="chb_option">
        <button type="button" id="btn_fullOption">토핑 전체 선택</button>
        <br><br>
        대<input type="radio" id="rd_large" name="size" value="30">
        중<input type="radio" id="rd_medium" name="size" value="20">
        소<input type="radio" id="rd_small" name="size" value="10">

        <br><br>
        <select id = "select_order">
            <option value="here">매장식사</option>
            <option value="togo">포장</option>
            <option value="delivery">배달</option>    
        </select>
        <button type="button" id="btn_check">셀렉트박스 확인</button>
    </form>
    <script>
        const button = document.getElementById("btn_fullOption");
        const chkbox1 = document.getElementById("chn_cs");
        const chkbox2 = document.getElementById("chb_cr");
        const chkbox3 = document.getElementById("chb_pp");
        const chkbox = [chkbox1,chkbox2,chkbox3];
        document.querySelector('#btn_fullOption').addEventListener('click',()=>{
            const chb_option = document.getElementsByClassName('chb_option');

            for(const chb of chb_option){
                chb.checked = true;
            }
        })
        document.getElementById('rd_large').checked = true;
        document.getElementById('btn_check').addEventListener('click',()=>{
            console.log(document.getElementById('select_order').value);
            
            const select_options = document.querySelectorAll('#select_order option');

            for(const option of select_options){
                console.log('option : '+option.value + " "+option.selected + " "+ option.textContent);
            }
        })

    </script>
</body>
</html>
