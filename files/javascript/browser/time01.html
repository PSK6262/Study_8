<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        .box{
            width:100px;
            height:100px;
            background-color: forestgreen;
            position: relative;
            left:0px;
        }
    </style>
</head>
<body>
    <p id="pid">기본 텍스트</p>
    <div class="box"></div>
    <button onclick="clearIntervalBox()">박스 멈추기</button>
    <p id="clock"></p>
    <script>
        setTimeout(()=>{
            document.getElementById('pid').textContent="3초뒤에 바뀐 텍스트";
        },3000);
        setTimeout(()=>{ // 특정 시간에 한번
            document.getElementById('pid').style.color="red";
        },5000);
        const divBox = document.querySelectorAll('.box')[0];
        let leftV = 0;
        const boxMoveInterval = setInterval(()=>{ // 특정 간격마다 반복
            console.log(divBox.style.left);
            leftV += 50;
            divBox.style.left = leftV+'px';
            if(leftV >= 400) leftV=0;
        },1000);

        function clearIntervalBox(){
            clearInterval(boxMoveInterval);
        }
        setInterval(()=>{
            const current = new Date();
            const time = String(current.getHours()).padStart(2,'0') + " : " +
                        String(current.getMinutes()).padStart(2,'0') + " : " +
                        String(current.getSeconds()).padStart(2,'0');

            document.getElementById('clock').textContent=time;
        },1000)
    </script>
</body>
</html>
