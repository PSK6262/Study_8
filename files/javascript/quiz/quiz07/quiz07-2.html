<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
    /* 필요시 작성 */
    .background-gray{
        background-color: gray;
    }
    .textcolor-red{
        color:red;
    }
    </style>
</head>
<body>
    <div class="container">
        <div id="main">
            <p id="p1">p1 텍스트</p>
            <p id="p2">p2 텍스트</p>
        </div>
    </div>
    <button onclick="changeMain()">main 배경색 gray로 변경</button>
    <button onclick="changeP1()">p1 글자색 red로 변경</button>
    <button onclick="changeP2()">"p2 텍스트"를 "p2 글자" 로 변경</button>
    <script>
    /* 코드 작성 부분 */
    function changeMain(){
        document.getElementById(`main`).classList.toggle('background-gray');
    }
    function changeP1(){
        document.getElementById(`p1`).classList.toggle('textcolor-red');
    }
    let num = 1;
    function changeP2(){
        let text_arr = ["p2 텍스트","p2 하나","p2 둘","p2 셋","p2 넷"];
        const p2 = document.getElementById('p2');
        p2.textContent=text_arr[(num++)%text_arr.length];
    }
    </script>
</body>
</html>
