<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        *{
            margin:0;
            padding:0;
            box-sizing: border-box;
        }
        .box{
            width:300px;
            height:300px;
            background-image:url(../../img/ocean.jpg);
            border: 2px solid blue;
        }
        .box:hover{
            animation-name:box-ani;
            animation-duration: 1s;
            animation-delay: 1s;
            animation-fill-mode: forwards; 
            border: 2px solid red;
        }
        @keyframes box-ani {
            0% {
                width:400px;
                height:400px;
            }
            50% {
                width:500px;
                height:500px;
            }
            100% {
                width:600px;
                height:600px;
            }
        }
    </style>
</head>
<body>
    <div class="box"></div>
</body>
</html>
