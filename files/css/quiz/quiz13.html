<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        *{
            margin:0;
            padding:0;
            box-sizing: border-box;
        }
        .container{
            width:800px;
            margin: auto;
            margin-top:50px;
        }
        .header{display: flex;}
        .header-left{
            width:400px;
            height:100px;
            background-color: yellow;
            border: 2px solid black;
        }
        .header-right{
            width:400px;
            height:100px;
            background-color: gray;
            border: 2px solid black;
        }
        .nav{
            width: 800px;
            height: 100px;
            background-color: purple;
            border: 2px solid black;
        }
        .main{
            width: 800px;
            height:200px;
            display:flex;
        }
        .main-left{
            width:300px;
            height:200px;
            background-color: lightblue;
            border: 2px solid black;
        }
        .main-right-1{
            width:500px;
            height:100px;
            background-color: yellow;
            border: 2px solid black;
        }
        .main-right-2{
            width:500px;
            height:100px;
            background-color: lightpink;
            border: 2px solid black;
        }
        .footer{display: flex;}
        .footer-init{
            width:200px;
            height:100px;
            border: 2px solid black;
        }
        .f-one{background-color: yellow;}
        .f-two{background-color: orange;}
        .f-three{background-color: yellow;}
        .f-four{background-color: green;}
        @media screen and (max-width:700px) {
            .container{width:100%;}
            .main{flex-wrap: wrap; width:100%;} 
            .main-left{width: 40%;}
            .main-right{width:60%;}
            .main-right-1,.main-right-2{width:100%;}
        }
        @media screen and (max-width:650px) {
            .footer{
                width:100%;
                flex-wrap: wrap;
            }
            .f-one,.f-two,.f-three,.f-four{width:50%;}
        }
        @media screen and (max-width:500px) {
            .main-left{
                width:100%; 
                height:100px;
            }
            .main-right{
                display: flex; 
                width:100%;
            }
            .main-right-1,.main-right-2{width:50%;}
            .header{flex-wrap:wrap;}
            .header-left,.header-right{width:100%;}
        }
        @media screen and (max-width:350px) {
            .main{height: auto;}
            .main-right{flex-direction: column;}
            .main-right-1,.main-right-2{width:100%;}     
            .f-one,.f-two,.f-three,.f-four{width:100%;}
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <div class="header-left"></div>
            <div class="header-right"></div>
        </div>
        <div class="nav"></div>
        <div class="main">
            <div class="main-left"></div>
            <div class="main-right">
                <div class="main-right-1"></div>
                <div class="main-right-2"></div>
            </div>
        </div>
        <div class="footer">
            <div class="footer-init f-one"></div>
            <div class="footer-init f-two"></div>
            <div class="footer-init f-three"></div>
            <div class="footer-init f-four"></div>
        </div>
    </div>
</body>
</html>
