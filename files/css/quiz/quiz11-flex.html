<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        *{
            margin:0;
            padding:0;
            box-sizing: border-box;
        }
        .container{
            margin: auto;
        }
        .header{
            display: flex;
        }
        .header-left{
            width:400px;
            height:100px;
            background-color: yellow;
        }
        .header-right{
            width:400px;
            height:100px;
            background-color: gray;
        }
        .main{
            display:flex;
        }
        .nav{
            width: 800px;
            height: 100px;
            background-color: purple;
        }
        .main-left{
            width:300px;
            height:200px;
            background-color: antiquewhite;
        }
        .main-right-1{
            width:500px;
            height:100px;
            background-color: yellow;
        }
        .main-right-2{
            width:500px;
            height:100px;
            background-color: orange;
        }
        .footer{
            display: flex;
        }
        .footer-1{
            width:200px;
            height:100px;
            background-color: yellow;
        }
        .footer-2{
            width:200px;
            height:100px;
            background-color: orange;
        }
        .footer-3{
            width:200px;
            height:100px;
            background-color: aquamarine;
        }
        .footer-4{
            width:200px;
            height:100px;
            background-color: cadetblue;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <div class="header-left"></div>
            <div class="header-right"></div>
        </div>
        <div class="nav"></div>
        <div class="main">
            <div class="main-left"></div>
            <div class="main-right">
                <div class="main-right-1"></div>
                <div class="main-right-2"></div>
            </div>
        </div>
        <div class="footer">
            <div class="footer-1"></div>
            <div class="footer-2"></div>
            <div class="footer-3"></div>
            <div class="footer-4"></div>
        </div>
    </div>
</body>
</html>
