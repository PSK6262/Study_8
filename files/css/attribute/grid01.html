<!DOCTYPE html>
<html lang="ko">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>

    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        .item {
            border: 1px solid black;
        }

        .container {
            display: grid;
            grid-template-rows: 80px 80px;
            grid-template-columns: 90px 90px 90px ;

            row-gap: 5px; 
            /* row(위아래)를 5px 띄우겠다 */
            column-gap: 10px;
            /* col(좌우)를 10px 띄우겠다 */
        }

        .row-merge {
            /* grid-row-start: 1;
            grid-row-end: 3; */
            /* 위 두줄은 1~3줄까지 합치겠다는 뜻 */
            grid-row: 1 / span 2;
        }

        .col-merge {
            /* grid-column-start: 2;
            grid-column-end: 4; */
            grid-column: 2 / 4;
        }
    </style>

</head>

<body>

    <div class="container">
        <div class="item row-merge"></div> 
        <!-- row-merge col-merge는 td할때 col row랑 비슷한거 -->
        <div class="item col-merge"></div>
        <div class="item"></div>
        <div class="item"></div>
        <!-- <div class="item"></div> -->
        <!-- <div class="item"></div> -->
    </div>
</body>

</html>
