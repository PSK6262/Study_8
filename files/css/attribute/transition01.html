<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        *{
            margin:0;
            padding:0;
            box-sizing: border-box;
        }
        .box{
            width: 100px;
            height: 100px;
            background-color: rebeccapurple;
            margin : 20px;
            transition-property: all;
            transition-duration: 3s;
            /* transition-delay: 1s; */
            /* transition-timing-function: cubic-bezier(0.075, 0.82, 0.165, 1); */
            /* 만약 hover에 property를 주면 hover 끝난 경우 바로 꺼짐 , 마우스 내릴땐 작동 안한다는 것*/
            /* 마우스에 hover하는 과정은 똑같으나 hover가 끝나는 순간 바뀜*/
        }
        .box:hover{ 
            width: 300px;
            background-color: cornflowerblue;
        }
        .container:hover .box{
            width: 300px;
            background-color: cornflowerblue; 
        }
    </style>
</head>
<body>
    <div class="box"></div>
    <div class="container">
        <div class="box" style="transition-timing-function:linear;"></div>
        <div class="box" style="transition-timing-function:ease;"></div>
        <div class="box" style="transition-timing-function:ease-in;"></div>
        <div class="box" style="transition-timing-function:ease-out;"></div>
        <div class="box" style="transition-timing-function:ease-in-out;"></div>
    </div>
</body>
</html>
