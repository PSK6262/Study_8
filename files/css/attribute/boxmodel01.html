<!DOCTYPE html>
    <html lang="ko">
    <head>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <title>Document</title>
        <style> 
            *{
                margin:0;
                padding:0;
                box-sizing: border-box; /*border까지 포함한 사이즈로 width height 인식 , 편해진다 */
                /*width:200px;
                height:200px;*/  /* 사이즈 조절 */ 
            }
            .box1{
                border: 2px solid blue;
                border-radius: 10%;
                margin: 1rem;
                padding: 1rem;
            }
            .box2{
                border: 2px solid red;
                border-radius: 10%;
                margin: 1rem;
                padding: 1rem;
            }
        </style>
    </head>
    <body>
        <br>
        <span class="box1">box1</span>
        <span class="box1">box2</span>
        <span class="box1">box3</span>
        <br><br><br>
        <span class="box2">box4</span>
        <span class="box2">box5</span>
        <span class="box2">box6</span>
    </body>
</html>
