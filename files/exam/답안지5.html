<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        *{
            margin:5px;
        }
        .container{
            display:flex;
            flex-flow: column;
        }
        .box{
            width: 300px;
            height: 100px;
            background-color: aqua;
        }
        /* 600미만일땐 column으로 3개, 600넘어가면 row + wrap*/
        @media screen and (min-width:600px) { 
            .container{
                flex-direction: row;
                flex-wrap: wrap;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="box">CSS</div>
        <div class="box">HTML</div>
        <div class="box">자바스크립트</div>
    </div>
</body>
</html>
