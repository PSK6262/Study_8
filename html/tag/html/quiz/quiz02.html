    <!DOCTYPE html>
    <html lang="ko">
    <head>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <title>Document</title>
    </head>
    <body>
        <form>
            고객명 : <input type="text"> <br><br>
            전화번호 : <input type="text"> <br><br>
            E-mail : <input type="email"> <br><br>
            피자선택 : 
            <select>
                <option selected disabled> 피자를 선택하세요 </option>
                <option> 페퍼로니 </option>
                <option> 콤비네이션</option>
                <option> 치즈피자 </option>
            </select>
            <fieldset>
                <legend>피자 사이즈</legend>
                <label><input type="radio" name="size"> Small <br><br></label>
                <label><input type="radio" name="size"> Medium <br><br></label>
                <label><input type="radio" name="size"> Large <br></label>
            </fieldset>
            <fieldset>
                <legend>토핑 선택</legend>
                <label><input type="checkbox"> 베이컨 <br><br></label>
                <label><input type="checkbox"> 치즈 <br><br></label>
                <label><input type="checkbox"> 양파 <br><br></label>
                <label><input type="checkbox"> 버섯 <br></label>
            </fieldset> <br>
            희망배송시간 : <input type="time"> <br><br>
            배송시 요청사항 : <textarea></textarea> <br><br>
            <input type="button" value="주문하기">
        </form>
    </body>
</html>
